<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reticulated Python Genetic Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar">
        <a class="navbar-brand" href="{{ url_for('izracunaj') }}">ReticGen</a>
        <a class="nav-link" href="{{ url_for('pregled_arhiva') }}">Arhiva</a>
    </nav>

    <div class="container">
        <h2>Reticulated Python Genetic Calculator</h2>

        <div class="form-row">
            <div class="form-group">
                <label for="parent1" class="form-label">Roditelj 1:</label>
                <select id="parent1" class="form-select" multiple size="10">
                    {% for gen in geni %}
                        <option value="{{ gen }}">{{ gen }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group center">
                <h3>X</h3>
            </div>
            <div class="form-group">
                <label for="parent2" class="form-label">Roditelj 2:</label>
                <select id="parent2" class="form-select" multiple size="10">
                    {% for gen in geni %}
                        <option value="{{ gen }}">{{ gen }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="button-row">
            <button id="calcBtn" class="btn btn-primary">Izračunaj</button>
            <button id="clearBtn" class="btn btn-secondary">Očisti</button>
            <button id="shareBtn" class="btn btn-success" style="display:none;">Share link</button>
        </div>

        <table id="resultsTable" class="table" style="display:none;">
            <thead>
                <tr>
                    <th>Vjerojatnost</th>
                    <th>Morph</th>
                </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>
    </div>

    <script>
        let currentShareLink = "";

        function odabraniGeni(selectId) {
            const select = document.getElementById(selectId);
            const odabrano = [];
            for (const opcija of select.options) {
                if (opcija.selected) {
                    odabrano.push(opcija.value);
                }
            }
            return odabrano;
        }

        document.getElementById('calcBtn').addEventListener('click', function() {
            const zmija1 = odabraniGeni('parent1');
            const zmija2 = odabraniGeni('parent2');

            fetch('/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "zmija1": zmija1, "zmija2": zmija2 })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('resultsTable').style.display = 'table';
                document.getElementById('shareBtn').style.display = 'inline-block';
                currentShareLink = data.share_link;

                const tbody = document.getElementById('resultsBody');
                tbody.innerHTML = "";
                for (const [morf, postotak] of Object.entries(data.rezultat_parenja)) {
                    tbody.innerHTML += `<tr><td><strong>${postotak}%</strong></td><td>${morf}</td></tr>`;
                }
            })
            .catch(error => console.error('Greška:', error));
        });

        document.getElementById('shareBtn').addEventListener('click', function() {
            if (currentShareLink) {
                navigator.clipboard.writeText(currentShareLink).then(() => {
                    alert("Link je kopiran: " + currentShareLink);
                });
            }
        });

        document.getElementById('clearBtn').addEventListener('click', function() {
            document.getElementById('parent1').selectedIndex = -1;
            document.getElementById('parent2').selectedIndex = -1;
            document.getElementById('resultsTable').style.display = 'none';
            document.getElementById('shareBtn').style.display = 'none';
        });
    </script>

</body>
</html>
