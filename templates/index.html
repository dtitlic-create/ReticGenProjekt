<!DOCTYPE html>
<html>
<head>
    <title>ReticGen - Genetski Kalkulator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="navigacija">
        <a class="brand" href="{{ url_for('izracunaj') }}">ReticGen</a>
        <a class="link" href="{{ url_for('pregled_arhiva') }}">Arhiva</a>
    </div>

    <div class="sadrzaj">
        <h2>Reticulated Python Genetic Calculator</h2>

        <div class="roditelji">
            <div class="roditelj">
                <label for="parent1">Roditelj 1:</label><br>
                <select id="parent1" class="odabir" multiple size="10">
                    {% for gen in geni %}
                        <option value="{{ gen }}">{{ gen }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="krizic">
                <h3>X</h3>
            </div>
            <div class="roditelj">
                <label for="parent2">Roditelj 2:</label><br>
                <select id="parent2" class="odabir" multiple size="10">
                    {% for gen in geni %}
                        <option value="{{ gen }}">{{ gen }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="gumbi">
            <button id="calcBtn" class="btn plavi">Izračunaj</button>
            <button id="clearBtn" class="btn sivi">Očisti</button>
            <button id="shareBtn" class="btn zeleni" style="display:none;">Share link</button>
        </div>

        <table id="resultsTable" class="tablica" style="display:none;">
            <thead>
                <tr>
                    <th>Vjerojatnost</th>
                    <th>Morph</th>
                </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>
    </div>

    <script>
        let trenutniLink = "";

        function odabraniGeni(selectId) {
            const select = document.getElementById(selectId);
            const odabrano = [];
            for (const opcija of select.options) {
                if (opcija.selected) {
                    odabrano.push(opcija.value);
                }
            }
            return odabrano;
        }

        document.getElementById('calcBtn').addEventListener('click', function() {
            const zmija1 = odabraniGeni('parent1');
            const zmija2 = odabraniGeni('parent2');

            fetch('/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "zmija1": zmija1, "zmija2": zmija2 })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('resultsTable').style.display = 'table';
                document.getElementById('shareBtn').style.display = 'inline-block';
                trenutniLink = data.share_link;

                const tbody = document.getElementById('resultsBody');
                tbody.innerHTML = "";
                for (const [morf, postotak] of Object.entries(data.rezultat_parenja)) {
                    tbody.innerHTML += `<tr><td><strong>${postotak}%</strong></td><td>${morf}</td></tr>`;
                }
            })
            .catch(error => console.error('Greška:', error));
        });

        document.getElementById('shareBtn').addEventListener('click', function() {
            if (trenutniLink) {
                navigator.clipboard.writeText(trenutniLink).then(() => {
                    alert("Link je kopiran: " + trenutniLink);
                });
            }
        });

        document.getElementById('clearBtn').addEventListener('click', function() {
            document.getElementById('parent1').selectedIndex = -1;
            document.getElementById('parent2').selectedIndex = -1;
            document.getElementById('resultsTable').style.display = 'none';
            document.getElementById('shareBtn').style.display = 'none';
        });
    </script>

</body>
</html>
